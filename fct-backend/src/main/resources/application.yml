server:
    error:
        include-stacktrace: never
        include-message: always
    port: 8080

spring:
    application:
        name: fct-backend
    output:
        ansi:
            enabled: always
    datasource:
        url: jdbc:h2:mem:testdb
        driverClassName: org.h2.Driver
        username: sa
        password:
        platform: h2

    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: update
        defer-datasource-initialization: true

    h2:
        console:
            enabled: true
            path: /h2-console

    sql:
        init:
            mode: always
            platform: h2
