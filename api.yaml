                404:
                    description: User not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorMessage"
        put:
            summary: Update a user
            operationId: updateUser
            tags:
                - Users
            parameters:
                - name: id
                  in: path
                  description: User id
                  required: true
                  schema:
                      type: integer
                      format: int64
