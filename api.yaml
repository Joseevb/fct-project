                                $ref: "#/components/schemas/ErrorMessage"

components:
    schemas:
        # ---- Enums ----
        RoleEnum:
            type: string
            enum: [ADMIN, USER]
            x-field-extra-annotation: "@ValidEnum(RoleEnum.class)"
        AddressTypeEnum:
            type: string
            enum: [PRIMARY, SECONDARY]
            x-field-extra-annotation: "@ValidEnum(AddressTypeEnum.class)"
        AppointmentStatusEnum:
            type: string
            enum: [WAITING, ACCEPTED, DECLINED]
            x-field-extra-annotation: "@ValidEnum(AppointmentStatusEnum.class)"
        InvoiceStatusEnum:
            type: string
            enum: [WAITING, PAID, DECLINED]
            x-field-extra-annotation: "@ValidEnum(InvoiceStatusEnum.class)"

        # ---- Objects ----
        User:
            type: object
            properties:
                id:
                    type: integer
                    format: int64
                username:
                    type: string
                firstName:
                    type: string
                lastName:
                    type: string
                email:
                    type: string
                    format: email
                password:
                    type: string
                    format: password
                    x-field-extra-annotation: >-
                        @com.fasterxml.jackson.annotation.JsonInclude(com.fasterxml.jackson.annotation.JsonInclude.Include.NON_NULL)
                role:
                    $ref: "#/components/schemas/RoleEnum"
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
            required:
                [
                    id,
                    username,
                    firstName,
                    lastName,
                    email,
                    password,
                    createdAt,
                    updatedAt,
                    role,
                ]
        Address:
            type: object
            properties:
                id:
                    type: integer
                    format: int64
                street:
                    type: string
                city:
                    type: string
                state:
                    type: string
                zipCode:
                    type: string
                country:
                    type: string
                addressType:
                    $ref: "#/components/schemas/AddressTypeEnum"
                userId:
                    type: integer
                    format: int64
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
            required:
                [
                    id,
                    street,
                    city,
                    state,
                    zipCode,
                    country,
                    createdAt,
                    updatedAt,
                    addressType,
                    userId,
                ]
        Appointment:
            type: object
            properties:
                id:
                    type: integer
                    format: int64
                date:
                    type: string
                    format: date-time
                duration:
                    type: integer
                    format: int32
                status:
                    $ref: "#/components/schemas/AppointmentStatusEnum"
                description:
                    type: string
                price:
                    type: number
                    format: double
                userId:
                    type: integer
                    format: int64
                categoryId:
                    type: integer
                    format: int64
            required:
                [
                    id,
                    date,
                    duration,
                    status,
                    description,
                    price,
                    userId,
                    categoryId,
                ]

        AppointmentCategory:
            type: object
            properties:
                id:
                    type: integer
                    format: int64
                name:
                    type: string
                quotePerHour:
                    type: number
                    format: double
            required: [id, name, quotePerHour]
        Invoice:
            type: object
            properties:
                id:
                    type: integer
                    format: int64
                status:
                    $ref: "#/components/schemas/InvoiceStatusEnum"
                paymentMethod:
                    type: string
                notes:
                    type: string
                totalPrice:
                    type: number
                    format: double
                userId:
                    type: integer
                    format: int64
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
            required:
                [
                    id,
                    status,
                    paymentMethod,
                    notes,
                    totalPrice,
                    userId,
                    createdAt,
                    updatedAt,
                ]
        LineItem:
            type: object
            properties:
                id:
                    type: integer
                    format: int64
                subtotal:
                    type: number
                    format: double
                quantity:
                    type: integer
                    format: int32
                appointmentId:
                    type: integer
                    format: int64
                invoiceId:
                    type: integer
                    format: int64
                createdAt:
                    type: string
                    format: date-time
            required: [id, subtotal, quantity, createdAt, invoiceId]

        # ---- Requests ----
        ## ----- User ------
        AddUserRequest:
            type: object
            properties:
                username:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "Username field cannot be blank")'
                firstName:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "First name field cannot be blank")'
                lastName:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "Last name field cannot be blank")'
                email:
                    type: string
                    format: email
                    x-field-extra-annotation: >-
                        @NotBlank(message = "Email name field cannot be blank")
                        @Email(message = "Email format is not valid")
                password:
                    type: string
                    format: password
                    x-field-extra-annotation: >-
                        @NotBlank(message = "Password field cannot be blank")
                        @Password
                role:
                    $ref: "#/components/schemas/RoleEnum"
            required: [username, firstName, lastName, email, password, role]
        UpdateUserRequest:
            type: object
            properties:
                username:
                    type: string
                    x-field-extra-annotation: '@NotEmpty(message = "Username field cannot be empty")'
                firstName:
                    type: string
                    x-field-extra-annotation: '@NotEmpty(message = "First name field cannot be empty")'
                lastName:
                    type: string
                    x-field-extra-annotation: '@NotEmpty(message = "Last name field cannot be empty")'
                email:
                    type: string
                    format: email
                    x-field-extra-annotation: >-
                        @Email(message = "Email format is not valid")
                        @NotEmpty(message = "Last name field cannot be empty")
                role:
                    $ref: "#/components/schemas/RoleEnum"
        ## ---- Address ----
        AddAddressRequest:
            type: object
            properties:
                street:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "Street field cannot be blank")'
                city:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "City field cannot be blank")'
                state:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "State field cannot be blank")'
                zipCode:
                    type: string
                    pattern: "^[A-Za-z0-9\\-\\s]{3,12}$"
                    x-field-extra-annotation: >-
                        @NotBlank(message = "State field cannot be blank")
                        @Pattern(regexp = "^[A-Za-z0-9\\-\\s]{3,12}$", message = "Zip code must be valid")
                country:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "Country field cannot be blank")'
                addressType:
                    $ref: "#/components/schemas/AddressTypeEnum"
                userId:
                    type: integer
                    format: int64
            required:
                [street, city, state, zipCode, country, addressType, userId]
        UpdateAddressRequest:
            type: object
            properties:
                street:
                    type: string
                city:
                    type: string
                state:
                    type: string
                zipCode:
                    type: string
                country:
                    type: string
                addressType:
                    $ref: "#/components/schemas/AddressTypeEnum"
                userId:
                    type: integer
                    format: int64
        ## ---- Appointment ----
        AddAppointmentRequest:
            type: object
            properties:
                name:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "Name field cannot be blank")'
                description:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "Description field cannot be blank")'
                date:
                    type: string
                    format: date-time
                    x-field-extra-annotation: >-
                        @Future(message = "Date must be in the future")
                        @DateTimeFormat(iso = DateTimeFormat.ISO.DATE_TIME)
                duration:
                    type: integer
                    format: int32
                    x-field-extra-annotation: >-
                        @Min(value = 1, message = "Duration must be greater than 0")
                        @Max(value = 7, message = "Duration must be less than 7")
                userId:
                    type: integer
                    format: int64
                categoryId:
                    type: integer
                    format: int64
            required: [name, description, duration, categoryId, date, userId]
        UpdateAppointmentRequest:
            type: object
            properties:
                name:
                    type: string
                description:
                    type: string
                duration:
                    type: integer
                    format: int32
                    x-field-extra-annotation: >-
                        @Min(value = 1, message = "Duration must be greater than 0")
                        @Max(value = 7, message = "Duration must be less than 7")
                date:
                    type: string
                    format: date-time
                    x-field-extra-annotation: >-
                        @Future(message = "Date must be in the future")
                        @DateTimeFormat(iso = DateTimeFormat.ISO.DATE_TIME)
                categoryId:
                    type: integer
                    format: int64
        UpdateAppointmentStatusRequest:
            type: object
            properties:
                status:
                    $ref: "#/components/schemas/AppointmentStatusEnum"
            required: [status]

        ## ---- AppointmentCategory ----
        AddAppointmentCategoryRequest:
            type: object
            properties:
                name:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "Name field cannot be blank")'
                quotePerHour:
                    type: number
                    format: double
                    minimum: 1
            required: [name, quotePerHour]
        UpdateAppointmentCategoryRequest:
            type: object
            properties:
                name:
                    type: string
                    x-field-extra-annotation: '@NotEmpty(message = "Name field cannot be empty")'
                quotePerHour:
                    type: number
                    format: double
                    minimum: 1

        ## ---- Invoice ----
        AddInvoiceRequest:
            type: object
            properties:
                paymentMethod:
                    type: string
                    x-field-extra-annotation: '@NotBlank(message = "Payment method field cannot be blank")'
                notes:
                    type: string
                userId:
                    type: integer
                    format: int64
            required: [paymentMethod, notes, userId]
        UpdateInvoiceStatusRequest:
            type: object
            properties:
                status:
                    $ref: "#/components/schemas/InvoiceStatusEnum"
            required: [status]

        ## ---- LineItem ----
        AddLineItemRequest:
            type: object
            # x-class-extra-annotation: '@ExactlyOneIdPresent(fields = { "appointmentId", "productId", "courseId" })'
            # TODO Add the rest of the fields once the classes have been created
            x-class-extra-annotation: '@ExactlyOneIdPresent(fields = { "appointmentId"})'
            properties:
                quantity:
                    type: integer
                    format: int32
                appointmentId:
                    type: integer
                    format: int64
                invoiceId:
                    type: integer
                    format: int64
            required: [subtotal, quantity, invoiceId]

        ## ---- Security ----
        RegisterRequest:
            type: object
            properties:
                username:
                    type: string
                    x-field-extra-annotation: >-
                        @NotBlank(message = "Username field cannot be blank")
                password:
                    type: string
                    x-field-extra-annotation: >-
                        @Password
                        @NotBlank(message = "Password field cannot be blank")
                firstName:
                    type: string
                    x-field-extra-annotation: >-
                        @NotBlank(message = "First name field cannot be blank")
                lastName:
                    type: string
                    x-field-extra-annotation: >-
                        @NotBlank(message = "Last name field cannot be blank")
                email:
                    type: string
                    x-field-extra-annotation: >-
                        @NotBlank(message = "Email field cannot be blank")
                        @Email(message = "Email field is not valid")
            required: [username, password, firstName, lastName, email]
        RegisterResponse:
            type: object
            properties:
                userId:
                    type: integer
                    format: int64
                response:
                    type: string
        LoginRequest:
            type: object
            properties:
                username:
                    type: string
                    x-field-extra-annotation: >-
                        @NotBlank(message = "Username field cannot be blank")
                password:
                    type: string
                    x-field-extra-annotation: >-
                        @NotBlank(message = "Password field cannot be blank")
            required: [username, password]
        LoginResponse:
            type: object
            properties:
                jwt:
                    type: string
                refreshToken:
                    type: string
                userId:
                    type: integer
                    format: int64
                role:
                    $ref: "#/components/schemas/RoleEnum"
        RefreshTokenRequest:
            type: object
            properties:
                refreshToken:
                    type: string
                    x-field-extra-annotation: >-
                        @NotBlank(message = "Refresh token is required")
            required: [refreshToken]
        ChangePasswordRequest:
            type: object
            properties:
                oldPassword:
                    type: string
                    x-field-extra-annotation: >-
                        @Password
                        @NotBlank(message = "Password field cannot be blank")
                newPassword:
                    type: string
                    x-field-extra-annotation: >-
                        @Password
                        @NotBlank(message = "Password field cannot be blank")
            required: [oldPassword, newPassword]

        # ---- Error messages ----
        ErrorMessage:
            type: object
            properties:
                timestamp:
                    type: string
                    format: date-time
                    example: "1970-01-01T00:00+18:00"
                status:
                    type: integer
                    format: int32
                    example: 404
                error:
                    type: string
                    example: "Not Found"
                message:
                    type: string
                    example: "Resource not found"
                path:
                    type: string
                    example: "/api/v1/resource/1"
            required: [timestamp, status, error, message, path]
        ValidationErrorMessage:
            properties:
                timestamp:
                    type: string
                    format: date-time
                    example: "1970-01-01T00:00+18:00"
                status:
                    type: integer
                    format: int32
                    example: 404
                error:
                    type: string
                    example: "Bad Request"
                messages:
                    type: object
                    additionalProperties:
                        type: string
                    example:
                        "name": "Name field cannot be blank"
                path:
                    type: string
                    example: "/api/v1/resource/1"
            required: [timestamp, status, error, messages, path]
    securitySchemes:
        bearerAuth:
            description: Bearer token using a JWT
            type: http
            scheme: bearer
            bearerFormat: JWT
