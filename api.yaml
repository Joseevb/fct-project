openapi: 3.0.1
info:
    title: REST API for the website of "Academia Fabiana Perez"
    description: REST API for the website of "Academia Fabiana Perez"
    version: 1.0.0

servers:
    - url: http://localhost:8080/api/v1

paths:
    /user:
        get:
            summary: Get all users
            operationId: getAllUsers
            tags:
                - Users
            responses:
                200:
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/User"
                                example:
                                    [
                                        {
                                            id: 1,
                                            username: "admin",
                                            firstName: "Admin",
                                            lastName: "Admin",
                                            email: "admin@admin.com",
                                            password: "admin",
                                            createdAt: "2021-01-01T00:00:00.000Z",
                                            updatedAt: "2021-01-01T00:00:00.000Z",
                                            role: "ADMIN",
                                        },
                                        {
                                            id: 2,
                                            username: "user",
                                            firstName: "User",
                                            lastName: "User",
                                            email: "user@user.com",
                                            password: "user",
                                            createdAt: "2021-01-01T00:00:00.000Z",
                                            updatedAt: "2021-01-01T00:00:00.000Z",
                                            role: "USER",
                                        },
                                    ]
        post:
            summary: Add a new user
            operationId: addUser
            tags:
                - Users
            requestBody:
                description: User to add
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AddUserRequest"
            security:
                - bearerAuth: [admin]
            responses:
                201:
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/User"
                400:
                    description: Bad request
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ValidationErrorMessage"
                401:
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorMessage"
                403:
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorMessage"
                409:
                    description: User already exists
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorMessage"
    /user/{id}:
        get:
            summary: Get a user by id
            operationId: getUserById
            tags:
                - Users
            parameters:
                - name: id
                  in: path
                  description: User id
                  required: true
                  schema:
                      type: integer
                      format: int64
            responses:
                200:
